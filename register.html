<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sign Up</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body{
            background:#f4f7f6;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:#333;
        }

        .signup-container{
            width:100%;
            max-width:420px;
            background:#fff;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        .signup-header{
            text-align:center;
            margin-bottom:30px;
        }

        .signup-header h2{
            color:#2c3e50;
            margin-bottom:10px;
        }

        .signup-header p{
            color:#7f8c8d;
            font-size:15px;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:500;
            font-size:14px;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:15px;
            transition:.3s;
        }

        .input-group input:focus{
            outline:none;
            border-color:#3498db;
            box-shadow:0 0 5px rgba(52,152,219,.2);
        }

        .terms{
            display:flex;
            align-items:center;
            gap:8px;
            font-size:14px;
            margin-bottom:20px;
        }

        .terms a{
            color:#3498db;
            text-decoration:none;
        }

        .btn-signup{
            width:100%;
            padding:14px;
            background:#3498db;
            color:#fff;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
            transition:.3s;
        }

        .btn-signup:hover{
            background:#2980b9;
        }

        .signup-footer{
            text-align:center;
            margin-top:25px;
            color:#7f8c8d;
            font-size:14px;
        }

        .signup-footer a{
            color:#3498db;
            text-decoration:none;
            font-weight:500;
        }
    </style>

</head>
<body>

<div class="signup-container">

    <div class="signup-header">
        <h2>Create Account</h2>
        <p>Join Rossy Events and start planning your events.</p>
    </div>

   <form id="signupForm"></form>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" name="fullname" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="name@example.com" required>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="Enter your phone number" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmPassword" placeholder="Confirm your password" required>
        </div>

        <div class="terms">
            <input type="checkbox" required>
            <label>
                I agree to the
                <a href="#">Terms & Conditions</a>
            </label>
        </div>

        <button type="submit" class="btn-signup">
            Create Account
        </button>

    </form>

    <div class="signup-footer">
        Already have an account?
        <a href="/index.html">Log In</a>
    </div>

</div>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    alert("Account created successfully!");

    window.location.href = "/index.html";
});
</script>

</body>
</html>
