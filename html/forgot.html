<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background:#f4f7f6;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .forgot-container{
            width:100%;
            max-width:420px;
            background:#fff;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        .forgot-header{
            text-align:center;
            margin-bottom:30px;
        }

        .forgot-header h2{
            color:#2c3e50;
            margin-bottom:10px;
        }

        .forgot-header p{
            color:#7f8c8d;
            font-size:15px;
            line-height:1.5;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:500;
            color:#333;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:15px;
            transition:0.3s;
        }

        .input-group input:focus{
            outline:none;
            border-color:#3498db;
            box-shadow:0 0 5px rgba(52,152,219,.3);
        }

        .btn-reset{
            width:100%;
            padding:14px;
            background:#3498db;
            color:#fff;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
            transition:.3s;
        }

        .btn-reset:hover{
            background:#2980b9;
        }

        .forgot-footer{
            text-align:center;
            margin-top:25px;
            font-size:14px;
        }

        .forgot-footer a{
            text-decoration:none;
            color:#3498db;
            font-weight:600;
        }

        .forgot-footer a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="forgot-container">

    <div class="forgot-header">
        <h2>Forgot Password?</h2>
        <p>
            Enter your registered email address.<br>
            We'll send you instructions to reset your password.
        </p>
    </div>

    <form id="forgotForm">

        <div class="input-group">
            <label>Email Address</label>
            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>
        </div>

        <button type="submit" class="btn-reset">
            Send Reset Link
        </button>

    </form>

    <div class="forgot-footer">
        Remember your password?
        <a href="login.html">Back to Login</a>git 
    </div>

</div>

<script>

document.getElementById("forgotForm").addEventListener("submit",function(e){

    e.preventDefault();

    alert("Password reset link has been sent to your email.");

    window.location.href="login.html";

});

</script>

</body>
</html>
